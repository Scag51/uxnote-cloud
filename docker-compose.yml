version: '3.8'

services:
  uxnote-app:
    build: .
    container_name: uxnote-app
    restart: unless-stopped
    depends_on:
      uxnote-db:
        condition: service_healthy
    environment:
      DB_HOST: uxnote-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-uxnote}
      DB_USER: ${DB_USER:-uxnote}
      DB_PASSWORD: ${DB_PASSWORD:-uxnote_secret}
    volumes:
      - uxnote_uploads:/var/www/html/data/uploads
    labels:
      - "traefik.enable=true"

  uxnote-db:
    image: postgres:16-alpine
    container_name: uxnote-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-uxnote}
      POSTGRES_USER: ${DB_USER:-uxnote}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-uxnote_secret}
    volumes:
      - uxnote_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-uxnote}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uxnote_uploads:
    driver: local
  uxnote_db:
    driver: local
