version: '3.8'

services:
  uxnote-cloud:
    build: .
    container_name: uxnote-cloud
    restart: unless-stopped
    ports:
      - "8080:80"   # Changer le port externe si besoin, Coolify gère ça via son reverse proxy
    volumes:
      - uxnote_data:/var/www/html/data   # Persistance SQLite
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    labels:
      # Labels Coolify / Traefik (optionnel si vous configurez le domaine dans Coolify)
      - "traefik.enable=true"
      # - "traefik.http.routers.uxnote.rule=Host(`uxnote.votre-domaine.fr`)"

volumes:
  uxnote_data:
    driver: local
